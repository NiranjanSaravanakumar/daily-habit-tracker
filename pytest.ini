[pytest]
testpaths = tests
markers =
    signup: Signup flow tests
    login: Login flow tests
    habits: Habit management tests
    auth: Authentication guard tests
    otp: OTP verification tests
    api: Direct API endpoint tests
    ui: Frontend UI validation tests
addopts = -v --tb=short --cov=tests --cov-report=term --cov-report=html --cov-fail-under=80
