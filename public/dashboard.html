<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Your personal habit tracking dashboard. Add habits, mark completions, and see your daily progress.">
  <title>Dashboard – Habit Tracker</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="logo">
      <span>💪</span> Habit Tracker
    </div>
    <button class="btn-logout" id="logoutBtn">Log Out</button>
  </nav>

  <!-- Hero Banner -->
  <div class="hero-banner">
    <img src="images/hero-banner.png" alt="Misty forest" id="heroBanner">
  </div>

  <div class="dashboard-container">
    <!-- Planner Header -->
    <div class="planner-header">
      <div class="planner-logo">📝</div>
      <h1>Weekly Planner</h1>
      <p class="greeting" id="greeting">Stay consistent, stay unstoppable.</p>
    </div>

    <!-- Add Habit -->
    <div class="add-habit-section">
      <span class="plus-icon">+</span>
      <input type="text" id="habitInput" placeholder="New Week To do list" maxlength="100">
      <button class="btn-add" id="addHabitBtn">Add</button>
    </div>

    <!-- Divider -->
    <div class="divider"></div>

    <!-- Progress -->
    <div class="progress-section" id="progressSection">
      <h2>Today's Progress</h2>
      <div class="progress-bar-container">
        <div class="progress-bar" id="progressBar" style="width: 0%;"></div>
      </div>
      <div class="progress-stats">
        <span id="progressText">0 of 0 completed</span>
        <span class="percentage" id="progressPercentage">0%</span>
      </div>
    </div>

    <!-- Alert -->
    <div id="alert" class="alert"></div>

    <!-- Weekly Grid -->
    <div class="weekly-grid" id="weeklyGrid">
      <div class="day-column" data-day="0">
        <div class="day-header mon">Monday</div>
        <div class="habits-list" id="habitsList">
          <!-- Habit cards rendered dynamically -->
        </div>
      </div>
      <div class="day-column" data-day="1">
        <div class="day-header tue">Tuesday</div>
        <div class="day-habits"></div>
      </div>
      <div class="day-column" data-day="2">
        <div class="day-header wed">Wednesday</div>
        <div class="day-habits"></div>
      </div>
      <div class="day-column" data-day="3">
        <div class="day-header thu">Thursday</div>
        <div class="day-habits"></div>
      </div>
      <div class="day-column" data-day="4">
        <div class="day-header fri">Friday</div>
        <div class="day-habits"></div>
      </div>
      <div class="day-column" data-day="5">
        <div class="day-header sat">Saturday</div>
        <div class="day-habits"></div>
      </div>
      <div class="day-column" data-day="6">
        <div class="day-header sun">Sunday</div>
        <div class="day-habits"></div>
      </div>
    </div>

    <!-- Empty State -->
    <div class="empty-state" id="emptyState" style="display: none;">
      <div class="icon">👍</div>
      <p>No habits yet. Add your first habit above!</p>
    </div>
  </div>

  <!-- Side Nav Dots (decorative) -->
  <div class="side-nav">
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <script src="js/habits.js"></script>
</body>
</html>
