<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create an account on Habit Tracker to start building healthy daily habits.">
  <title>Sign Up – Habit Tracker</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h1>Create Account</h1>
      <p class="subtitle">Start building better habits today</p>

      <div id="alert" class="alert"></div>

      <form id="signupForm">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="John Doe" required autocomplete="name">
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required minlength="6" autocomplete="new-password">
        </div>
        <button type="submit" class="btn-primary" id="signupBtn">Create Account</button>
      </form>

      <p class="form-footer">
        Already have an account? <a href="login.html">Log in</a>
      </p>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
