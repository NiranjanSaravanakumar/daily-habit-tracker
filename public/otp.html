<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Verify your email with the OTP sent to your inbox.">
  <title>Verify OTP – Habit Tracker</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h1>Verify Email</h1>
      <p class="subtitle">Enter the 6-digit code sent to your email</p>

      <div id="alert" class="alert"></div>

      <form id="otpForm">
        <div class="form-group">
          <label for="otp">Verification Code</label>
          <input type="text" id="otp" class="otp-input" placeholder="000000" maxlength="6" required autocomplete="one-time-code" inputmode="numeric" pattern="[0-9]{6}">
        </div>
        <button type="submit" class="btn-primary" id="otpBtn">Verify</button>
      </form>

      <p class="form-footer">
        Didn't receive a code? <a href="signup.html">Sign up again</a>
      </p>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
